<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>온라인 할리갈리</title>
    <!-- 분리된 CSS 파일들 연결 -->
    <link rel="stylesheet" href="base.css?v=12" />
    <link rel="stylesheet" href="layout.css?v=12" />
    <link rel="stylesheet" href="buttons.css?v=12" />
    <link rel="stylesheet" href="cards.css?v=12" />
    <link rel="stylesheet" href="ui-elements.css?v=12" />
  </head>
  <body>
    <!-- 모드 선택 화면 -->
    <div id="mode-screen" class="screen">
      <h1>할리갈리</h1>
      <p>게임 모드를 선택하세요.</p>
      <div class="player-select">
        <button class="btn" onclick="selectGameMode('solo')">
          싱글 플레이 (vs COM)
        </button>
        <button class="btn" onclick="selectGameMode('multi')">
          멀티 플레이 (PvP)
        </button>
      </div>
    </div>

    <!-- 난이도 선택 화면 -->
    <div id="difficulty-screen" class="screen hidden">
      <button class="back-btn" onclick="goBackToMode()">⬅</button>
      <h1>할리갈리</h1>
      <p>난이도를 선택하세요.</p>
      <div class="player-select">
        <button class="btn" onclick="selectDifficulty('easy')">
          초급 (반응 느림)
        </button>
        <button class="btn" onclick="selectDifficulty('normal')">
          중급 (반응 보통)
        </button>
        <button class="btn" onclick="selectDifficulty('hard')">
          고급 (반응 빠름)
        </button>
      </div>
    </div>

    <!-- 닉네임 입력 화면 -->
    <div id="nickname-screen" class="screen hidden">
      <button class="back-btn" onclick="goBackToModeFromNickname()">⬅</button>
      <h1>닉네임 설정</h1>
      <p>사용할 닉네임을 입력하세요.</p>
      <div class="player-select">
        <input
          type="text"
          id="nickname-input"
          class="text-input"
          placeholder="닉네임 입력 (필수)"
          maxlength="8"
        />
        <button class="btn" onclick="confirmNickname()">다음</button>
      </div>
    </div>

    <!-- 닉네임 확인 모달 화면 -->
    <div id="confirm-screen" class="screen hidden">
      <h1>확인</h1>
      <p id="confirm-desc">정말 참가하시겠습니까?</p>
      <div class="player-select">
        <button class="btn" onclick="proceedWithNickname()">예</button>
        <button class="btn" onclick="cancelNickname()">아니오</button>
      </div>
    </div>

    <!-- 멀티 플레이 접속 화면 -->
    <div id="multi-entry-screen" class="screen hidden">
      <button class="back-btn" onclick="goBackToNicknameFromMulti()">⬅</button>
      <h1>멀티 플레이</h1>
      <div class="player-select">
        <button class="btn" onclick="createRoom()">방 만들기</button>

        <hr
          style="border: 1px solid rgba(255, 255, 255, 0.3); margin: 10px 0"
        />

        <input
          type="text"
          id="room-code-input"
          class="text-input"
          placeholder="입장 코드 입력 (6자리)"
          maxlength="6"
          style="text-transform: uppercase"
        />
        <button class="btn" onclick="joinRoom()">코드로 입장하기</button>
      </div>
    </div>

    <!-- 멀티 플레이 대기실 화면 -->
    <div id="multi-lobby-screen" class="screen hidden">
      <button class="back-btn" onclick="leaveRoom()">⬅</button>
      <h1>대기실</h1>
      <p>
        입장 코드:
        <span
          id="lobby-room-code"
          style="
            color: #fbc02d;
            font-size: 2rem;
            letter-spacing: 2px;
            vertical-align: middle;
          "
          >------</span
        >
        <button
          class="btn"
          style="
            padding: 5px 10px;
            font-size: 1rem;
            vertical-align: middle;
            margin-left: 10px;
          "
          onclick="copyRoomCode()"
        >
          복사
        </button>
      </p>

      <div
        id="lobby-players"
        class="player-select"
        style="
          background: rgba(0, 0, 0, 0.5);
          padding: 15px;
          border-radius: 10px;
          min-height: 150px;
          justify-content: flex-start;
        "
      >
        <!-- 접속한 플레이어 목록이 동적으로 추가됩니다 -->
      </div>

      <div class="player-select">
        <button
          class="btn"
          id="lobby-start-btn"
          onclick="startMultiGame()"
          disabled
        >
          게임 시작 (방장 전용)
        </button>
      </div>
    </div>

    <!-- 순서 정하기 화면 -->
    <div id="turn-screen" class="screen hidden">
      <button class="back-btn" onclick="goBackToDifficulty()">⬅</button>
      <h1>순서 뽑기</h1>
      <p>
        카드를 하나 골라주세요.<br />'先'을 뽑은 사람부터 시계 방향으로
        진행합니다.
      </p>
      <div id="turn-cards" class="turn-cards-container"></div>
      <div id="turn-result" class="turn-result"></div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-container" class="hidden">
      <button class="back-btn" onclick="pauseGame()">⬅</button>

      <!-- 일시정지 화면 -->
      <div id="pause-screen" class="screen hidden">
        <h1 id="pause-title">일시정지</h1>
        <div class="player-select" id="pause-buttons">
          <button class="btn" id="resume-btn" onclick="resumeGame()">
            계속하기
          </button>
          <button class="btn" id="quit-btn" onclick="quitGame()">
            그만하기
          </button>
        </div>
      </div>

      <!-- 게임 종료 모달 화면 -->
      <div id="game-over-screen" class="screen hidden">
        <h1 id="game-over-title">게임 종료</h1>
        <p id="game-over-desc">결과 메시지</p>
        <div class="player-select">
          <button class="btn" onclick="resetToStartScreen()">
            처음으로 돌아가기
          </button>
        </div>
      </div>

      <!-- 다수 컴퓨터 영역 -->
      <div id="opponents-container">
        <!-- 컴퓨터 UI가 동적으로 생성됩니다 -->
      </div>

      <!-- 카운트다운 표시 영역 -->
      <div id="countdown" class="hidden"></div>

      <!-- 중앙 영역 (종) -->
      <div class="center-area">
        <button id="bell-btn" onclick="userRingBell()">🔔</button>
        <div id="message">게임 시작 버튼을 눌러주세요!</div>
      </div>

      <!-- 플레이어 영역 -->
      <div class="area player-area">
        <div class="info" id="info-0">
          🙋‍♂️ 내 카드: <span id="user-deck-count">0</span>장
        </div>
        <div class="cards-container">
          <div
            class="deck-slot card-back"
            id="user-deck"
            onpointerdown="userFlip()"
          ></div>
          <div class="card-slot" id="user-card"></div>
        </div>

        <div class="controls">
          <button
            class="btn hidden"
            id="start-btn"
            onclick="resetToStartScreen()"
          >
            처음으로
          </button>
        </div>
      </div>
    </div>

    <!-- Firebase SDK (Compat 버전) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <!-- 분리된 JS 파일들 연결 (순서 중요) -->
    <script src="state.js?v=12"></script>
    <script src="ui.js?v=12"></script>
    <script src="game.js?v=12"></script>
  </body>
</html>
